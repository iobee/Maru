name: Release DMG

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag. Defaults to v<CFBundleShortVersionString>."
        required: false
        type: string
      prerelease:
        description: "Mark the GitHub release as a prerelease."
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  release-dmg:
    name: Build and upload DMG
    runs-on: macos-latest
    env:
      GH_TOKEN: ${{ github.token }}
      MARU_CODE_SIGN_IDENTITY: ${{ vars.MARU_CODE_SIGN_IDENTITY }}
      MARU_DEVELOPMENT_TEAM: ${{ secrets.MARU_DEVELOPMENT_TEAM }}
      MARU_RELEASE_CERTIFICATE_BASE64: ${{ secrets.MARU_RELEASE_CERTIFICATE_BASE64 }}
      MARU_RELEASE_CERTIFICATE_PASSWORD: ${{ secrets.MARU_RELEASE_CERTIFICATE_PASSWORD }}
      MARU_KEYCHAIN_PASSWORD: ${{ secrets.MARU_KEYCHAIN_PASSWORD }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          set -euo pipefail
          if ! command -v xcodegen >/dev/null; then
            brew install xcodegen
          fi

      - name: Validate release signing inputs
        run: |
          set -euo pipefail
          for name in \
            MARU_RELEASE_CERTIFICATE_BASE64 \
            MARU_RELEASE_CERTIFICATE_PASSWORD \
            MARU_KEYCHAIN_PASSWORD
          do
            if [[ -z "${!name}" ]]; then
              echo "$name secret is required for stable release signing" >&2
              exit 1
            fi
          done
          if [[ -z "${MARU_CODE_SIGN_IDENTITY:-}" ]]; then
            echo "MARU_CODE_SIGN_IDENTITY=Maru Release Signing" >> "$GITHUB_ENV"
          fi

      - name: Import release signing certificate
        run: |
          set -euo pipefail
          certificate_path="$RUNNER_TEMP/maru-release-signing.p12"
          keychain_path="$RUNNER_TEMP/maru-signing.keychain-db"

          printf '%s' "$MARU_RELEASE_CERTIFICATE_BASE64" | base64 --decode > "$certificate_path"
          security create-keychain -p "$MARU_KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$MARU_KEYCHAIN_PASSWORD" "$keychain_path"
          security import "$certificate_path" \
            -P "$MARU_RELEASE_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$keychain_path"
          security list-keychains -d user -s "$keychain_path" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$MARU_KEYCHAIN_PASSWORD" \
            "$keychain_path"
          security find-identity -v -p codesigning "$keychain_path"

      - name: Read release metadata
        id: metadata
        run: |
          set -euo pipefail
          version="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' Sources/Maru/Info.plist)"
          build="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' Sources/Maru/Info.plist)"
          tag="${{ inputs.tag }}"
          if [[ -z "$tag" ]]; then
            tag="v$version"
          fi
          dmg_path="Release/Maru-$version.dmg"
          {
            echo "version=$version"
            echo "build=$build"
            echo "tag=$tag"
            echo "dmg_path=$dmg_path"
          } >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: swift test

      - name: Build release DMG
        run: ./Scripts/package-release.sh --no-smoke

      - name: Verify DMG exists
        run: |
          set -euo pipefail
          test -f "${{ steps.metadata.outputs.dmg_path }}"
          hdiutil imageinfo "${{ steps.metadata.outputs.dmg_path }}" >/dev/null

      - name: Create or update GitHub release
        run: |
          set -euo pipefail
          tag="${{ steps.metadata.outputs.tag }}"
          title="Maru ${{ steps.metadata.outputs.version }}"
          dmg_path="${{ steps.metadata.outputs.dmg_path }}"

          prerelease_args=()
          if [[ "${{ inputs.prerelease }}" == "true" ]]; then
            prerelease_args+=(--prerelease)
          fi

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "$dmg_path" --clobber
          else
            gh release create "$tag" "$dmg_path" \
              --title "$title" \
              --target "$GITHUB_SHA" \
              --generate-notes \
              "${prerelease_args[@]}"
          fi
