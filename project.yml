name: Maru
options:
  bundleIdPrefix: com.nick
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  DEVELOPMENT_LANGUAGE: zh_CN
  MARKETING_VERSION: 1.0.0-beta.4
  CURRENT_PROJECT_VERSION: 4
  CODE_SIGN_IDENTITY: "-"
  CODE_SIGN_STYLE: Automatic

targets:
  Maru:
    type: application
    platform: macOS
    sources:
      - path: Sources/Maru
        excludes:
          - Info.plist
          - Utilities/demo.lua
    dependencies:
      - package: Sparkle
        product: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nick.maru
        INFOPLIST_FILE: Sources/Maru/Info.plist
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Automatic

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.9.1
