name: Maru
options:
  bundleIdPrefix: com.nick
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    DEVELOPMENT_LANGUAGE: zh_CN
    MARKETING_VERSION: 1.0.0-beta.6
    CURRENT_PROJECT_VERSION: 6
    CODE_SIGN_STYLE: Manual
  configs:
    Debug:
      CODE_SIGN_IDENTITY: "-"
    Release:
      CODE_SIGN_IDENTITY: "$(MARU_CODE_SIGN_IDENTITY)"
      DEVELOPMENT_TEAM: "$(MARU_DEVELOPMENT_TEAM)"

targets:
  Maru:
    type: application
    platform: macOS
    sources:
      - path: Sources/Maru
        excludes:
          - Info.plist
          - Utilities/demo.lua
    dependencies:
      - package: Sparkle
        product: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nick.maru
        INFOPLIST_FILE: Sources/Maru/Info.plist
        CODE_SIGN_STYLE: Manual
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "-"
        Release:
          CODE_SIGN_IDENTITY: "$(MARU_CODE_SIGN_IDENTITY)"
          DEVELOPMENT_TEAM: "$(MARU_DEVELOPMENT_TEAM)"

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.9.1
